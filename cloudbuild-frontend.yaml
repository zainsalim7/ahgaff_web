# Frontend Deployment - Kaniko Optimized (الأسرع للـ Expo build)
# Kaniko + cache-repo → يحفظ node_modules layer في registry
# عند البناء التالي: لو لم يتغير package.json → لا يعيد yarn install (يوفر 3 دقائق)

substitutions:
  _BACKEND_URL: 'https://ahgaff-backend-m64upx4eha-ww.a.run.app'

steps:
  # بناء وتخزين باستخدام Kaniko
  - name: 'gcr.io/kaniko-project/executor:latest'
    id: 'build-and-push-frontend'
    args:
      - '--dockerfile=frontend/Dockerfile'
      - '--context=frontend'
      - '--destination=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/frontend:$BUILD_ID'
      - '--destination=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/frontend:latest'
      - '--build-arg=EXPO_PUBLIC_BACKEND_URL=${_BACKEND_URL}'
      - '--cache=true'
      - '--cache-ttl=72h'
      - '--cache-repo=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/frontend-cache'
      - '--compressed-caching=false'
      - '--use-new-run'

  # النشر على Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ahgaff-frontend'
      - '--image=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/frontend:$BUILD_ID'
      - '--region=me-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=60'
      - '--concurrency=200'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
