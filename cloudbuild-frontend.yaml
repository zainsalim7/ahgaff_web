# Google Cloud Build - Frontend Deployment (محسّن للسرعة 3x)
# المهم: EXPO_PUBLIC_BACKEND_URL يُحقَن وقت البناء (مدمج داخل الـ JS bundle)

substitutions:
  _BACKEND_URL: 'https://ahgaff-backend-m64upx4eha-ww.a.run.app'

steps:
  # 1) سحب آخر صورة للـ cache
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-cache'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/frontend:latest || exit 0

  # 2) بناء صورة Docker مع cache (يوفر ~70% من وقت yarn install)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '--cache-from=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/frontend:latest'
      - '--build-arg'
      - 'EXPO_PUBLIC_BACKEND_URL=${_BACKEND_URL}'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '-t'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/frontend:$BUILD_ID'
      - '-t'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/frontend:latest'
      - '-f'
      - 'frontend/Dockerfile'
      - 'frontend'

  # 3) رفع الصورة (layers الجديدة فقط)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args:
      - 'push'
      - '--all-tags'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/frontend'

  # 4) النشر على Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ahgaff-frontend'
      - '--image=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/frontend:$BUILD_ID'
      - '--region=me-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=60'
      - '--concurrency=200'

images:
  - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/frontend:$BUILD_ID'
  - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  env:
    - 'DOCKER_BUILDKIT=1'

timeout: 1800s
