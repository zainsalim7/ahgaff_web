# Student App Frontend Deployment - Kaniko Optimized
# Cloud Run Service Name: students-frontend
# Domain: students.ahgaff.net (via Cloudflare Worker)
# Backend: api.ahgaff.net (shared)

substitutions:
  _BACKEND_URL: 'https://api.ahgaff.net'

steps:
  # بناء وتخزين باستخدام Kaniko
  - name: 'gcr.io/kaniko-project/executor:latest'
    id: 'build-and-push-students-frontend'
    args:
      - '--dockerfile=student-app/Dockerfile'
      - '--context=student-app'
      - '--destination=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/students-frontend:$BUILD_ID'
      - '--destination=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/students-frontend:latest'
      - '--build-arg=EXPO_PUBLIC_BACKEND_URL=${_BACKEND_URL}'
      - '--cache=true'
      - '--cache-ttl=72h'
      - '--cache-repo=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/students-frontend-cache'
      - '--compressed-caching=false'
      - '--use-new-run'

  # النشر على Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-students-frontend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'students-frontend'
      - '--image=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/students-frontend:$BUILD_ID'
      - '--region=me-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=60'
      - '--concurrency=200'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
