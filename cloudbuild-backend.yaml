# Google Cloud Build - Backend Deployment (محسّن للسرعة 3x)
# Trigger: عند push لفرع main (تتغير ملفات داخل backend/)

steps:
  # 1) سحب آخر صورة لاستخدامها كـ cache (يوفر ~60% من وقت البناء)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-cache'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:latest || exit 0

  # 2) بناء صورة Docker مع استخدام cache من السابق
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '--cache-from=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:latest'
      - '-t'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:$BUILD_ID'
      - '-t'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend'

  # 3) رفع الصورة (يرفع الـ layers الجديدة فقط)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - '--all-tags'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend'

  # 4) النشر على Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ahgaff-backend'
      - '--image=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:$BUILD_ID'
      - '--region=me-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=20'
      - '--timeout=300'
      - '--concurrency=80'
      - '--set-env-vars=DB_NAME=ahgaff_attendance'
      - '--update-secrets=MONGO_URL=mongo-url:latest,SECRET_KEY=jwt-secret:latest,ALLOWED_ORIGINS=allowed-origins:latest'

images:
  - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:$BUILD_ID'
  - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
