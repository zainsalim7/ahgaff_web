# Google Cloud Build - Backend Deployment
# يبني صورة Docker للـ backend وينشرها على Cloud Run
# Trigger: عند push لفرع main (تتغير ملفات داخل backend/)

steps:
  # 1) بناء صورة Docker من الـ Dockerfile الموجودة (نفسها التي يستخدمها Railway)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:$BUILD_ID'
      - '-t'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend'

  # 2) رفع الصورة لـ Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - '--all-tags'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend'

  # 3) النشر على Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ahgaff-backend'
      - '--image=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:$BUILD_ID'
      - '--region=me-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=20'
      - '--timeout=300'
      - '--concurrency=80'
      - '--set-env-vars=DB_NAME=ahgaff_attendance'
      # الأسرار الحساسة (MONGO_URL, SECRET_KEY, ALLOWED_ORIGINS) تُضبط من Console أو السطر التالي
      - '--update-secrets=MONGO_URL=mongo-url:latest,SECRET_KEY=jwt-secret:latest'

images:
  - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:$BUILD_ID'
  - 'me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
