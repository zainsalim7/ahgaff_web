# Backend Deployment - Kaniko Optimized (الأسرع لـ Cloud Build)
# Kaniko يخزّن كل layer مستقلاً في Artifact Registry → cache hits أسرع 3x

steps:
  # بناء وتخزين باستخدام Kaniko (caching متقدّم)
  - name: 'gcr.io/kaniko-project/executor:latest'
    id: 'build-and-push-backend'
    args:
      - '--dockerfile=backend/Dockerfile'
      - '--context=backend'
      - '--destination=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:$BUILD_ID'
      - '--destination=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:latest'
      - '--cache=true'
      - '--cache-ttl=72h'
      - '--cache-repo=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend-cache'
      - '--compressed-caching=false'
      - '--use-new-run'

  # النشر على Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ahgaff-backend'
      - '--image=me-central1-docker.pkg.dev/$PROJECT_ID/ahgaff/backend:$BUILD_ID'
      - '--region=me-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=20'
      - '--timeout=300'
      - '--concurrency=80'
      - '--set-env-vars=DB_NAME=ahgaff_attendance'
      - '--update-secrets=MONGO_URL=mongo-url:latest,SECRET_KEY=jwt-secret:latest,ALLOWED_ORIGINS=allowed-origins:latest,FIREBASE_SERVICE_ACCOUNT_JSON=firebase-service-account:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
